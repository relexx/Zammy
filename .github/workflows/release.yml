name: Release

on:
  push:
    branches:
      - main
      - 'release/v*'
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type (stable: nur auf main sinnvoll)'
        required: true
        default: 'pre-release'
        type: choice
        options:
          - pre-release
          - stable

permissions:
  contents: write

env:
  # Release signing keystore (base64-encoded JKS, alias=zammy)
  KEYSTORE_B64: 
  KEYSTORE_PASSWORD: zammy2024!
  KEY_PASSWORD: zammy2024!
  KEY_ALIAS: zammy

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release metadata
        id: meta
        run: |
          VERSION=$(grep 'versionName = ' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          SHA=$(git rev-parse --short HEAD)

          IS_STABLE=false
          if [[ "$GITHUB_REF" == "refs/heads/main" ]] || \
             [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.type }}" == "stable" ]]; then
            IS_STABLE=true
          fi

          if [ "$IS_STABLE" == "true" ]; then
            TAG="v${VERSION}"
            echo "type=stable"       >> $GITHUB_OUTPUT
            echo "prerelease=false"  >> $GITHUB_OUTPUT
            echo "make_latest=true"  >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manueller Pre-Release aus beliebigem Branch
            TAG="v${VERSION}-beta.${SHA}"
            echo "type=pre-release"  >> $GITHUB_OUTPUT
            echo "prerelease=true"   >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            # Automatischer Nightly aus release/v*
            if [[ "$GITHUB_REF" == refs/heads/release/v* ]]; then
              BVER="${GITHUB_REF_NAME#release/}"
            else
              BVER="v${VERSION}"
            fi
            DATE=$(date +%Y%m%d)
            TAG="${BVER}-nightly.${DATE}.${SHA}"
            echo "type=nightly"      >> $GITHUB_OUTPUT
            echo "prerelease=true"   >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=${TAG}"          >> $GITHUB_OUTPUT
          echo "name=Zammy ${TAG}"   >> $GITHUB_OUTPUT

      - name: Create and push stable tag
        if: steps.meta.outputs.type == 'stable'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.meta.outputs.tag }}"
          git push origin "${{ steps.meta.outputs.tag }}"

      - name: Generate changelog
        run: |
          TYPE="${{ steps.meta.outputs.type }}"
          if [ "$TYPE" == "stable" ]; then
            # The just-created tag is first; the previous stable is second
            LAST=$(git tag -l --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          else
            # Latest stable tag
            LAST=$(git tag -l --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          fi

          if [ -z "$LAST" ]; then
            COMMITS=$(git log --no-merges --pretty="- %s")
            echo -e "## Changes\n\n${COMMITS}" > changelog.txt
          else
            COMMITS=$(git log "${LAST}..HEAD" --no-merges --pretty="- %s")
            echo -e "## Changes since ${LAST}\n\n${COMMITS}" > changelog.txt
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/zammy-release.jks"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/zammy-release.jks

      - name: Rename APK
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/zammy-${TAG}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:    ${{ steps.meta.outputs.tag }}
          name:        ${{ steps.meta.outputs.name }}
          prerelease:  ${{ steps.meta.outputs.prerelease }}
          make_latest: ${{ steps.meta.outputs.make_latest }}
          body_path:   changelog.txt
          files:       app/build/outputs/apk/release/zammy-${{ steps.meta.outputs.tag }}.apk
          draft:       false

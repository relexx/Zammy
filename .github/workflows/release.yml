name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/zammy-release.jks"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 != '' && secrets.KEYSTORE_B64 || vars.KEYSTORE_B64 }}

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/zammy-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || 'zammy2024!' }}
          KEY_ALIAS: zammy
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || 'zammy2024!' }}

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "name=Zammy ${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "name=Zammy v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/zammy-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: app/build/outputs/apk/release/zammy-${{ steps.version.outputs.tag }}.apk
          body: |
            ## ${{ steps.version.outputs.name }}

            A full-featured Android client for self-hosted Zammad (v6/v7) helpdesk instances.

            ### What's new in 1.0
            - Ticket management: Open / Pending / Closed tabs with live search
            - Ticket detail: view article timeline, reply with attachments
            - Status and priority editing directly from the ticket detail screen
            - Create tickets with group selection, priority, and file attachments
            - Background sync via WorkManager with configurable interval (15/30/60 min)
            - Push notifications for new tickets and updates with deep-link to ticket
            - Trust-all-certificates option for self-signed CAs
            - Full English and German localisation

            ### Installation
            Download `zammy-${{ steps.version.outputs.tag }}.apk`, enable "Install from unknown sources" and install.

            > Requires Android 8.0 (API 26) or higher.
          draft: false
          prerelease: false
